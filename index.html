<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Holiday Planner — Connecting™</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e0e0e5;
    --text: #1d1d1f;
    --sub: #6e6e73;
    --blue: #0071e3;
    --blue-light: #e8f1fc;
    --l1: #34c759; --l1bg: #f0faf3;
    --l2: #ff9500; --l2bg: #fff7ec;
    --l3: #ff3b30; --l3bg: #fff2f1;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(0,0,0,.07);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: rgba(255,255,255,.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -.3px; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .logo span { color: var(--sub); font-weight: 400; }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 13px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--card); cursor: pointer;
    transition: all .15s; color: var(--sub); user-select: none;
  }
  .pill.l1.active { border-color: var(--l1); color: var(--l1); background: var(--l1bg); }
  .pill.l2.active { border-color: var(--l2); color: var(--l2); background: var(--l2bg); }
  .pill.l3.active { border-color: var(--l3); color: var(--l3); background: var(--l3bg); }

  .layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 57px); }

  .sidebar {
    background: var(--card); border-right: 1px solid var(--border);
    padding: 20px 16px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto;
  }
  .sidebar-label {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--sub); padding: 10px 8px 4px;
  }
  .country-btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px; border-radius: 10px; cursor: pointer;
    border: none; background: transparent; width: 100%; text-align: left;
    font-family: var(--font); font-size: 14px; color: var(--text);
    transition: background .12s; gap: 8px;
  }
  .country-btn:hover { background: var(--bg); }
  .country-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
  .country-left { display: flex; align-items: center; gap: 8px; pointer-events: none; }
  .country-flag { font-size: 20px; line-height: 1; }
  .fav-star {
    font-size: 14px; opacity: .3; cursor: pointer; transition: all .15s;
    background: none; border: none; padding: 2px 4px; line-height: 1; flex-shrink: 0;
  }
  .fav-star.active { opacity: 1; }
  .fav-star:hover { opacity: .7; transform: scale(1.2); }
  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 10px; cursor: pointer;
    border: none; background: transparent; width: 100%; text-align: left;
    font-family: var(--font); font-size: 14px; color: var(--text);
    font-weight: 500; transition: background .12s;
  }
  .nav-btn:hover { background: var(--bg); }
  .nav-btn.active { background: var(--blue-light); color: var(--blue); }

  main { padding: 28px 28px 60px; }

  .view-header { margin-bottom: 20px; }
  .view-title { font-size: 28px; font-weight: 700; letter-spacing: -.5px; line-height: 1.1; }
  .view-sub { font-size: 15px; color: var(--sub); margin-top: 4px; }

  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
    background: var(--card); border-radius: 12px; padding: 12px 16px;
    border: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--sub); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink:0; }
  .legend-dot.l1 { background: var(--l1); }
  .legend-dot.l2 { background: var(--l2); }
  .legend-dot.l3 { background: var(--l3); }

  .upcoming-label { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing:.04em; text-transform:uppercase; margin-bottom:10px; }
  .upcoming-strip { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 28px; scrollbar-width: none; }
  .upcoming-strip::-webkit-scrollbar { display: none; }
  .upcoming-card {
    flex: 0 0 auto; background: var(--card); border-radius: 14px;
    border: 1.5px solid var(--border); padding: 14px 16px 12px; min-width: 155px; max-width:180px;
    cursor: default; transition: all .15s; position: relative; overflow: hidden;
  }
  .upcoming-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .upcoming-card.l1 { border-color: var(--l1); background: var(--l1bg); }
  .upcoming-card.l2 { border-color: var(--l2); background: var(--l2bg); }
  .upcoming-card.l3 { border-color: var(--l3); background: var(--l3bg); }
  .uc-days { font-size: 11px; font-weight: 700; letter-spacing:.04em; text-transform:uppercase; margin-bottom:4px; }
  .l1 .uc-days { color: var(--l1); } .l2 .uc-days { color: var(--l2); } .l3 .uc-days { color: var(--l3); }
  .uc-emoji { font-size: 22px; position:absolute; top:12px; right:12px; }
  .uc-name { font-size: 14px; font-weight: 600; line-height:1.2; padding-right:28px; }
  .uc-date { font-size: 12px; color: var(--sub); margin-top:3px; }
  .uc-flags { font-size:12px; margin-top:3px; }

  .month-section { margin-bottom: 36px; }
  .month-title {
    font-size: 20px; font-weight: 700; letter-spacing: -.3px;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .month-badge { font-size: 12px; font-weight: 600; background: var(--blue-light); color: var(--blue); padding: 2px 10px; border-radius: 20px; }

  .holiday-list { display: flex; flex-direction: column; gap: 10px; }
  .holiday-row {
    background: var(--card); border-radius: var(--radius); padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    border: 1.5px solid var(--border); transition: all .15s;
  }
  .holiday-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .holiday-row.l3 { border-left: 4px solid var(--l3); }
  .holiday-row.l2 { border-left: 4px solid var(--l2); }
  .holiday-row.l1 { border-left: 4px solid var(--l1); }
  .hday-date { min-width: 50px; text-align: center; }
  .hday-day { font-size: 24px; font-weight: 700; line-height: 1; color: var(--blue); }
  .hday-mon { font-size: 11px; font-weight: 600; color: var(--sub); margin-top:1px; text-transform:uppercase; }
  .hday-info { flex: 1; min-width: 0; }
  .hday-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .hday-emoji { font-size: 18px; flex-shrink:0; }
  .hday-desc { font-size: 13px; color: var(--sub); margin-top: 2px; line-height:1.4; }
  .hday-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
  .hday-right { display: flex; align-items: center; gap: 10px; flex-shrink:0; }
  .country-flags-row { display: flex; gap: 1px; font-size: 16px; flex-wrap:wrap; max-width:80px; }
  .level-badge {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 46px; height: 46px; border-radius: 12px; font-weight: 700; flex-shrink:0;
  }
  .level-badge.l1 { background: var(--l1bg); color: var(--l1); }
  .level-badge.l2 { background: var(--l2bg); color: var(--l2); }
  .level-badge.l3 { background: var(--l3bg); color: var(--l3); }
  .lb-icon { font-size: 17px; line-height: 1; }
  .lb-label { font-size: 9px; font-weight: 600; letter-spacing:.03em; text-transform:uppercase; margin-top:1px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    main { padding: 16px; }
  }
</style>
</head>

<header>
  <div class="logo">🗓️ Holiday Planner <span>/ Connecting™</span></div>

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────

// nth weekday in a month: weekday 0=Sun…6=Sat, n=1,2,3,4
function nthWeekday(y, month, weekday, n) {
  const d = new Date(y, month - 1, 1);
  let count = 0;
  while (true) {
    if (d.getDay() === weekday) { count++; if (count === n) return new Date(d); }
    d.setDate(d.getDate() + 1);
  }
}

// Easter Sunday (Anonymous Gregorian)
function easterDate(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31);
  const dy=((h+l-7*m+114)%31)+1;
  return new Date(y, mo-1, dy);
}

// Fixed date
function fixed(month, day) {
  return (y) => new Date(y, month-1, day);
}

// Jewish holidays — lookup table (accurate dates for 2025-2028)
// Key: "holiday-year" → [month, day]
const JEWISH_DATES = {
  // Purim (14 Adar)
  'purim-2025':[3,13], 'purim-2026':[3,3], 'purim-2027':[3,23], 'purim-2028':[3,11],
  // Pesach / Passover (15 Nisan — Seder night)
  'pesach-2025':[4,12], 'pesach-2026':[4,1], 'pesach-2027':[4,21], 'pesach-2028':[4,10],
  // Rosh Hashana
  'rosh-2025':[9,22], 'rosh-2026':[9,20], 'rosh-2027':[9,11], 'rosh-2028':[10,1],
  // Sukkot (15 Tishrei, ~5 days after Rosh Hashana)
  'sukkot-2025':[10,16], 'sukkot-2026':[10,14], 'sukkot-2027':[10,5], 'sukkot-2028':[10,25],
  // Hanukkah (25 Kislev)
  'hanukkah-2025':[12,14], 'hanukkah-2026':[12,4], 'hanukkah-2027':[12,24], 'hanukkah-2028':[12,12],
};

function jewishHoliday(key) {
  return (y) => {
    const k = `${key}-${y}`;
    const entry = JEWISH_DATES[k];
    if (entry) return new Date(y, entry[0]-1, entry[1]);
    // fallback: try next year
    const k2 = `${key}-${y+1}`;
    const e2 = JEWISH_DATES[k2];
    if (e2) return new Date(y+1, e2[0]-1, e2[1]);
    return null;
  };
}

// Black Friday = day after US Thanksgiving (4th Thursday of November)
function blackFriday(y) {
  const t = nthWeekday(y, 11, 4, 4); // 4th Thursday
  return new Date(y, 10, t.getDate() + 1);
}
// Cyber Monday = Monday after Black Friday
function cyberMonday(y) {
  const bf = blackFriday(y);
  return new Date(y, 10, bf.getDate() + 3);
}
// US Thanksgiving = 4th Thursday of November
function thanksgiving(y) { return nthWeekday(y, 11, 4, 4); }
// Canadian Thanksgiving = 2nd Monday of October
function caThanksgiving(y) { return nthWeekday(y, 10, 1, 2); }
// Mothering Sunday UK = 4th Sunday of Lent = 3 weeks before Easter
function motheringSunday(y) {
  const e = easterDate(y);
  return new Date(y, e.getMonth(), e.getDate() - 21);
}
// EU Summer Sales start: last Wednesday of June (FR official)
function euSoldes(y) {
  // approx: June 25 each year
  return new Date(y, 5, 25);
}
// AU/NZ Father's Day = 1st Sunday of September
function fathersDayAU(y) { return nthWeekday(y, 9, 0, 1); }

  // ── DECEMBER ─────────────────────────────────────────────
  { id:'hanukkah', name:"Hanukkah",                   emoji:'🕎', getDate:jewishHoliday('hanukkah'), countries:['il','us'],                     level:2, tags:['IL','Gift'],        desc:"Hanukkah gifting — couple and family campaigns work well in IL + US Jewish market." },
  { id:'xmaseve',  name:"Christmas Eve",              emoji:'🎁', getDate:fixed(12,24), countries:['us','gb','fr','au','nz','ca','de','it','es'], level:2, tags:['Gift','Xmas'],   desc:"Last-minute gifting rush — digital and fast-delivery products especially strong." },
  { id:'xmas',     name:"Christmas",                  emoji:'🎄', getDate:fixed(12,25), countries:['us','gb','fr','au','nz','ca','de','it','es'], level:3, tags:['Gift','Top','Xmas'], desc:"Biggest gift-buying moment of the year. All-out promotion for all markets." },
  { id:'nye',      name:"New Year's Eve Sale",        emoji:'🥂', getDate:fixed(12,31), countries:['us','gb','fr','au','nz','ca','de','it','es','il'], level:2, tags:['Sale','NYE'], desc:"Couples celebration night — last-minute gift and experience promotions." },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let favorites    = JSON.parse(localStorage.getItem('hol_fav')    || 'null') || COUNTRIES.filter(c=>c.defaultFav).map(c=>c.id);
let selectedCtry = localStorage.getItem('hol_sel') || 'favorites';
let activeLevels = JSON.parse(localStorage.getItem('hol_lvl')    || '[1,2,3]');

function persist() {
  localStorage.setItem('hol_fav', JSON.stringify(favorites));
  localStorage.setItem('hol_sel', selectedCtry);
  localStorage.setItem('hol_lvl', JSON.stringify(activeLevels));
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const MON_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON_ABR   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayDate() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

// Resolve the NEXT occurrence of a holiday from today
function nextOccurrence(h) {
  const today = todayDate();
  const y = today.getFullYear();
  for (let yr = y; yr <= y + 2; yr++) {
    const d = h.getDate(yr);
    if (!d) continue;
    const norm = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (norm >= today) return norm;
  }
  return null;
}

function daysUntil(d) {
  return Math.round((d - todayDate()) / 86400000);
}

function levelInfo(l) {
  if (l===3) return { icon:'🔥', label:'Printer',   cls:'l3' };
  if (l===2) return { icon:'💰', label:'Potential', cls:'l2' };
  return            { icon:'✅', label:'Decent',    cls:'l1' };
}

function cObj(id) { return COUNTRIES.find(c=>c.id===id); }

function visibleCountries() {
  if (selectedCtry==='favorites') return favorites;
  if (selectedCtry==='all')       return COUNTRIES.map(c=>c.id);
  return [selectedCtry];
}

// Build enriched holiday list: resolve dates, filter by country & level
function buildHolidayList() {
  const vis = visibleCountries();
  const result = [];
  for (const h of HOLIDAYS) {
    const match = h.countries.filter(c => vis.includes(c));
    if (!match.length) continue;
    if (!activeLevels.includes(h.level)) continue;
    const d = nextOccurrence(h);
    if (!d) continue;
    result.push({ ...h, _date: d, _matchCountries: match, _daysUntil: daysUntil(d) });
  }
  return result.sort((a,b) => a._date - b._date);
}

// ─── RENDER SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('btn-favorites').className = 'nav-btn' + (selectedCtry==='favorites' ? ' active' : '');
  document.getElementById('btn-all').className       = 'nav-btn' + (selectedCtry==='all'       ? ' active' : '');
  const list = document.getElementById('countryList');
  list.innerHTML = COUNTRIES.map(c => {
    const isFav = favorites.includes(c.id);
    const isAct = selectedCtry === c.id;
    return `<button class="country-btn${isAct?' active':''}" onclick="selectCountry('${c.id}')">
      <div class="country-left">
        <span class="country-flag">${c.flag}</span>
        <span>${c.name}</span>
      </div>
      <span class="fav-star${isFav?' active':''}" title="${isFav?'Remove from favorites':'Add to favorites'}" onclick="toggleFav(event,'${c.id}')">⭐</span>
    </button>`;
  }).join('');
}

// ─── RENDER MAIN ──────────────────────────────────────────────────────────────
function renderMain() {
  const main = document.getElementById('mainContent');
  const holidays = buildHolidayList();

  // Title
  let title = '⭐ Favorite Markets', sub = `${favorites.length} favorite market${favorites.length!==1?'s':''}`;
  if (selectedCtry!=='favorites' && selectedCtry!=='all') {
    const c = cObj(selectedCtry); title = `${c.flag} ${c.name}`; sub = 'Discount-worthy holidays for this market';
  } else if (selectedCtry==='all') {
    title = '🌍 All Markets'; sub = 'Every discount-worthy holiday across all markets';
  }

  // Legend
  const legend = `<div class="legend">
    <div class="legend-item"><div class="legend-dot l3"></div><strong>Level 3 — Money Printer 🔥</strong>&nbsp;Must go all-out. Huge revenue potential.</div>
    <div class="legend-item"><div class="legend-dot l2"></div><strong>Level 2 — High Potential 💰</strong>&nbsp;Strong campaign, worth investing.</div>
    <div class="legend-item"><div class="legend-dot l1"></div><strong>Level 1 — Decent ✅</strong>&nbsp;Banner or small promo. Easy win.</div>
  </div>`;

  // Upcoming (next 90 days)
  const upcoming = holidays.filter(h => h._daysUntil >= 0 && h._daysUntil <= 90).slice(0, 10);
  let upcomingHtml = '';
  if (upcoming.length) {
    const cards = upcoming.map(h => {
      const li = levelInfo(h.level);
      const dLabel = h._daysUntil===0 ? 'Today! 🚨' : h._daysUntil===1 ? 'Tomorrow' : `In ${h._daysUntil} days`;
      const dateStr = `${h._date.getDate()} ${MON_ABR[h._date.getMonth()]} ${h._date.getFullYear()}`;
      const flags = h._matchCountries.map(id=>cObj(id)?.flag||'').join('');
      return `<div class="upcoming-card ${li.cls}">
        <div class="uc-emoji">${h.emoji}</div>
        <div class="uc-days">${dLabel}</div>
        <div class="uc-name">${h.name}</div>
        <div class="uc-date">${dateStr}</div>
        <div class="uc-flags">${flags}</div>
      </div>`;
    }).join('');
    upcomingHtml = `<div class="upcoming-label">⚡ Coming Up — Next 90 Days</div><div class="upcoming-strip">${cards}</div>`;
  }

  // Group by month
  const monthMap = {};
  for (const h of holidays) {
    const key = `${h._date.getFullYear()}-${String(h._date.getMonth()+1).padStart(2,'0')}`;
    const label = `${MON_NAMES[h._date.getMonth()]} ${h._date.getFullYear()}`;
    if (!monthMap[key]) monthMap[key] = { label, items: [] };
    monthMap[key].items.push(h);
  }

  let monthsHtml = '';
  if (!Object.keys(monthMap).length) {
    monthsHtml = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No holidays match your filters</div><div>Try enabling more levels or selecting more markets.</div></div>`;
  } else {
    Object.entries(monthMap).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([,{label,items}]) => {
      const rows = items.map(h => {
        const li = levelInfo(h.level);
        const flags = h._matchCountries.map(id=>`<span>${cObj(id)?.flag||''}</span>`).join('');
        const tags  = h.tags.map(t=>`<span class="tag">${t}</span>`).join('');
        return `<div class="holiday-row ${li.cls}">
          <div class="hday-date">
            <div class="hday-day">${h._date.getDate()}</div>
            <div class="hday-mon">${MON_ABR[h._date.getMonth()]}</div>
          </div>
          <div class="hday-info">
            <div class="hday-name"><span class="hday-emoji">${h.emoji}</span>${h.name}</div>
            <div class="hday-desc">${h.desc}</div>
            <div class="hday-tags">${tags}</div>
          </div>
          <div class="hday-right">
            <div class="country-flags-row">${flags}</div>
            <div class="level-badge ${li.cls}"><div class="lb-icon">${li.icon}</div><div class="lb-label">Lvl ${h.level}</div></div>
          </div>
        </div>`;
      }).join('');
      monthsHtml += `<div class="month-section">
        <div class="month-title">${label}<span class="month-badge">${items.length} holiday${items.length!==1?'s':''}</span></div>
        <div class="holiday-list">${rows}</div>
      </div>`;
    });
  }

  main.innerHTML = `
    <div class="view-header"><div class="view-title">${title}</div><div class="view-sub">${sub}</div></div>
    ${legend}
    ${upcomingHtml}
    ${monthsHtml}`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectCountry(id) {
  selectedCtry = id; persist(); renderSidebar(); renderMain();
}
function toggleFav(e, id) {
  e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(f=>f!==id) : [...favorites, id];
  persist(); renderSidebar();
  if (selectedCtry==='favorites') renderMain();
}

// Level filters
document.querySelectorAll('#levelFilters .pill').forEach(pill => {
  const lv = parseInt(pill.dataset.level);
  if (!activeLevels.includes(lv)) pill.classList.remove('active');
  pill.addEventListener('click', () => {
    if (activeLevels.includes(lv)) {
      if (activeLevels.length===1) return;
      activeLevels = activeLevels.filter(l=>l!==lv);
      pill.classList.remove('active');
    } else {
      activeLevels = [...activeLevels, lv];
      pill.classList.add('active');
    }
    persist(); renderMain();
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSidebar();
renderMain();
</script>
</body>
</html>
